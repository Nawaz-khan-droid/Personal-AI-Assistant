<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Terminal</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            background: #222;
            color: #00ff00;
            border: 1px solid #00ff00;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }
        button:disabled {
            border-color: #555;
            color: #555;
            background: #111;
            cursor: not-allowed;
            box-shadow: none;
        }
        #status {
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
    <!-- Official LiveKit Vanilla JS SDK UMD Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>
<body>

    <h1 style="font-weight: 300; letter-spacing: 3px; margin-bottom: 2rem;">SYSTEM BOOT SEQUENCE</h1>
    <button id="connectBtn" onclick="initiateSecureLink()">ESTABLISH SECURE LINK</button>
    <div id="status">Status: Offline</div>

    <script>
        let room;

        async function initiateSecureLink() {
            const btn = document.getElementById('connectBtn');
            const statusDiv = document.getElementById('status');
            
            try {
                btn.disabled = true;
                statusDiv.innerText = "Status: Fetching Token...";

                // 1. Fetch token from our local FastAPI endpoint
                const response = await fetch('http://localhost:8000/api/token');
                if (!response.ok) throw new Error("Failed to clear security token authentication.");
                const data = await response.json();

                statusDiv.innerText = "Status: Connecting to Cell...";

                // 2. Initialize native Room using the global LivekitClient wrapper
                room = new LivekitClient.Room({
                    adaptiveStream: true,
                    dynacast: true
                });

                // 3. Set up automated engine speaker attachments
                room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === 'audio') {
                        const audioElement = track.attach();
                        document.body.appendChild(audioElement);
                    }
                });

                // 4. Connect to your LiveKit Cloud routing URL
                await room.connect('wss://jarvis-rwmsjr82.livekit.cloud', data.token);
                statusDiv.innerText = "Status: Secure Link Active";
                statusDiv.style.color = "#00ff00";
                btn.innerText = "CONNECTED";

                // 5. Automatically publish your microphone track straight to the core worker
                await room.localParticipant.setMicrophoneEnabled(true);
                
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Status: Link Interrupted";
                statusDiv.style.color = "#ff0000";
                btn.disabled = false;
                btn.innerText = "RETRY LINK";
            }
        }
    </script>
</body>
</html>
