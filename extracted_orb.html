<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SHADER_START:ANIMATION_14 class="fixed inset-0 w-full h-full" -->
<div class="fixed inset-0 w-full h-full" style="display:block;">
<canvas id="shader-canvas-ANIMATION_14" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_14');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;

varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

// Helper to create a rotating coordinate system
vec2 rotate(vec2 uv, float angle) {
    float s = sin(angle);
    float c = cos(angle);
    return vec2(uv.x * c - uv.y * s, uv.x * s + uv.y * c);
}

// Function to draw a ring with thickness and glow
float ring(vec2 uv, float radius, float thickness, float blur) {
    float dist = length(uv);
    return smoothstep(radius + thickness + blur, radius + thickness, dist) * 
           smoothstep(radius - thickness - blur, radius - thickness, dist);
}

// Function to draw dashed rings
float dashedRing(vec2 uv, float radius, float thickness, float segments, float speed) {
    float angle = atan(uv.y, uv.x) + u_time * speed;
    float dist = length(uv);
    float r = ring(uv, radius, thickness, 0.005);
    float dash = step(0.5, sin(angle * segments));
    return r * dash;
}

// Function for 'Listening' spikes / Frequency ripples
float frequencySpikes(vec2 uv, float radius, float count, float speed, float amplitude) {
    float angle = atan(uv.y, uv.x);
    float dist = length(uv);
    float wave = sin(angle * count + u_time * speed) * amplitude + sin(angle * count * 0.5 - u_time * speed * 0.7) * (amplitude * 0.6);
    float r = ring(uv, radius + wave, 0.001, 0.003);
    return r;
}

void main() {
    vec2 uv = (v_texCoord - 0.5) * 2.0;
    uv.x *= u_resolution.x / u_resolution.y;
    
    vec3 color = vec3(0.0);
    // Amber / Gold Palette
    vec3 accentColor = vec3(1.0, 0.75, 0.2); // Golden Amber
    vec3 coreColor = vec3(1.0, 0.9, 0.5);   // Bright Gold
    
    // 1. Central Core Breathing
    float breath = sin(u_time * 1.2) * 0.5 + 0.5;
    float core = ring(uv, 0.0, 0.04 + breath * 0.015, 0.01);
    color += core * coreColor * 2.0;
    
    // 2. Mathematical Orbital Paths (Concentric)
    for(float i = 1.0; i <= 3.0; i++) {
        float rotSpeed = (0.2 * i) * (mod(i, 2.0) == 0.0 ? 1.0 : -1.0);
        float rInner = ring(rotate(uv, u_time * rotSpeed), 0.15 * i, 0.001, 0.001);
        color += rInner * accentColor * (0.8 / i);
    }
    
    // 3. Technical Dashed Measurements
    color += dashedRing(uv, 0.42, 0.002, 60.0, 0.15) * accentColor * 0.6;
    color += dashedRing(uv, 0.45, 0.001, 120.0, -0.1) * accentColor * 0.4;
    
    // 4. Listening Ripples (Subtle Activity)
    float spikes = frequencySpikes(uv, 0.55, 50.0, 4.0, 0.02);
    color += spikes * accentColor * 0.7;
    
    // 5. Radial Data Pulse
    float pulse = fract(u_time * 0.4);
    float wave = ring(uv, pulse * 1.5, 0.0005, 0.05 * (1.0 - pulse));
    color += wave * accentColor * (1.0 - pulse) * 0.4;
    
    // 6. Outer Coordinate Tracking Rings
    float outerOrbit = ring(rotate(uv, u_time * -0.05), 0.75, 0.0005, 0.001);
    color += outerOrbit * accentColor * 0.3;
    
    // 7. Mouse Interaction Glow
    vec2 mouseUV = (u_mouse / u_resolution - 0.5) * 2.0;
    mouseUV.x *= u_resolution.x / u_resolution.y;
    float mouseDist = length(uv - mouseUV);
    float interaction = smoothstep(0.4, 0.0, mouseDist) * 0.15;
    color += interaction * coreColor;

    // Subtle Radial Vignette for Depth
    color *= smoothstep(1.5, 0.5, length(uv));

    gl_FragColor = vec4(color, color.r > 0.005 ? 1.0 : 0.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>
</div>
<!-- STITCH_SHADER_END:ANIMATION_14 -->
</body>
</html>
